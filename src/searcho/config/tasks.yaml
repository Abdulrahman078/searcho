research_task:
  description: >
    Use the Serper search tool to research {topic} and find exactly 3 items only.
    The 3 items must be the newest and trending AI updates in {current_year}.
    Include both AI news and AI papers when possible.
    Prioritize trusted sources (official company blogs, recognized tech media,
    arXiv, conference pages, or reputable labs).
    For each item, capture:
    - title
    - type (news or paper)
    - publish date
    - source
    - url
    - why it is trending (1 sentence)
    Do not return more than 3 items.
  expected_output: >
    A markdown list with exactly 3 bullet points, each containing title, type,
    publish date, source, url, and a one-line trending reason.
  agent: researcher

reporting_task:
  description: >
    Convert the research context into a concise markdown report for {topic}.
    The report must include:
    1) A title
    2) A short "Scope" section
    3) A section named "Top 3 New & Trending AI Updates"
    4) Exactly 3 numbered entries, each with:
       - title
       - type
       - publish date
       - source with url
       - 2-3 sentence summary
       - why it matters
    5) A short "Takeaways" section with 3 bullets
    Keep the report focused and do not add extra items beyond the top 3.
  expected_output: >
    A clean markdown report without code fences, containing exactly 3 curated updates.
  agent: reporting_analyst
